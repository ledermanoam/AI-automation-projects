[pytest]
# pytest configuration file

# Test discovery - look for tests in the 'tests' folder
testpaths = tests

# Show extra information when running tests
addopts =
    -v
    --html=reports/test_report.html
    --self-contained-html

# Markers let us group and filter tests
markers =
    ui: UI/browser tests using Playwright
    api: API/HTTP tests using requests
    smoke: Quick smoke tests to verify the app is up
    regression: Full regression test suite
